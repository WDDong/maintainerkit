<svg xmlns="http://www.w3.org/2000/svg" width="920" height="420" viewBox="0 0 920 420" role="img" aria-labelledby="title desc">
  <title id="title">MaintainerKit PR review sample</title>
  <desc id="desc">A sample GitHub pull request comment generated by MaintainerKit.</desc>
  <rect width="920" height="420" fill="#f6f8fa"/>
  <rect x="40" y="32" width="840" height="356" rx="8" fill="#ffffff" stroke="#d0d7de"/>
  <rect x="40" y="32" width="840" height="56" rx="8" fill="#f6f8fa" stroke="#d0d7de"/>
  <circle cx="70" cy="60" r="16" fill="#0969da"/>
  <text x="98" y="66" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="16" font-weight="600" fill="#24292f">maintainerkit</text>
  <text x="208" y="66" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="14" fill="#57606a">commented now</text>
  <text x="70" y="128" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="22" font-weight="600" fill="#24292f">MaintainerKit PR review</text>
  <text x="70" y="168" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#24292f">PR: Update GitHub workflow</text>
  <circle cx="78" cy="204" r="4" fill="#24292f"/>
  <text x="94" y="210" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#24292f">No test file changes were detected.</text>
  <circle cx="78" cy="236" r="4" fill="#24292f"/>
  <text x="94" y="242" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" fill="#24292f">Sensitive project or automation files changed.</text>
  <text x="70" y="286" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="15" font-weight="600" fill="#24292f">Changed files sampled:</text>
  <rect x="70" y="304" width="246" height="28" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="84" y="323" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="13" fill="#24292f">.github/workflows/ci.yml</text>
  <rect x="328" y="304" width="110" height="28" rx="6" fill="#f6f8fa" stroke="#d0d7de"/>
  <text x="342" y="323" font-family="SFMono-Regular,Consolas,Liberation Mono,monospace" font-size="13" fill="#24292f">src/action.js</text>
  <text x="70" y="364" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,Arial,sans-serif" font-size="14" fill="#57606a">This is an automated maintainer assist. Final review stays with project maintainers.</text>
</svg>
