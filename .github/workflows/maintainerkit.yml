name: MaintainerKit

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, synchronize, reopened]
  release:
    types: [created, edited]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  dry-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          dry-run: "true"
          github-token: ${{ github.token }}
